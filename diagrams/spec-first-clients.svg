<svg viewBox="0 0 1200 380" width="1200" height="380" font-family="Helvetica, Arial, sans-serif" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="spec-first typed clients: Famly's GraphQL schema feeds genqlient (with operations.graphql) producing api/famly/gen.go; Immich's OpenAPI feeds oapi-codegen producing api/immich/imapi/imapi.go. Both generated outputs are committed and consumed by the application.">
  <defs>
    <marker id="c-arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7 z" fill="#909090"/>
    </marker>
    <marker id="c-arrow-accent" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7 z" fill="#4a6741"/>
    </marker>
  </defs>
  <g font-family="Helvetica, Arial, sans-serif">

  <text x="20" y="32" font-size="22" font-weight="700" fill="#4a6741">spec-first typed clients</text>
  <text x="20" y="54" font-size="12" fill="#404040">vendors publish a spec; bairn writes operations against it; codegen produces the typed Go client. Generated code is committed; make gen refreshes when specs drift.</text>

  <text x="600" y="98" text-anchor="middle" font-size="11" font-weight="700" fill="#909090">FAMLY (GraphQL)</text>

  <rect x="40" y="115" width="200" height="70" rx="4" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
  <text x="140" y="138" text-anchor="middle" font-size="11" font-weight="700" fill="#0a0a0a">schema.graphql</text>
  <text x="140" y="156" text-anchor="middle" font-size="9" fill="#404040">hand-curated SDL subset</text>
  <text x="140" y="170" text-anchor="middle" font-size="9" fill="#404040">(committed)</text>

  <rect x="40" y="195" width="200" height="70" rx="4" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
  <text x="140" y="218" text-anchor="middle" font-size="11" font-weight="700" fill="#0a0a0a">operations.graphql</text>
  <text x="140" y="236" text-anchor="middle" font-size="9" fill="#404040">queries + mutations bairn calls</text>
  <text x="140" y="250" text-anchor="middle" font-size="9" fill="#404040">(committed)</text>

  <line x1="240" y1="150" x2="320" y2="180" stroke="#909090" stroke-width="1.5" marker-end="url(#c-arrow)"/>
  <line x1="240" y1="230" x2="320" y2="200" stroke="#909090" stroke-width="1.5" marker-end="url(#c-arrow)"/>

  <rect x="320" y="160" width="200" height="60" rx="4" fill="#f4f7f3" stroke="#4a6741" stroke-width="2"/>
  <text x="420" y="183" text-anchor="middle" font-size="11" font-weight="700" fill="#0a0a0a">go tool genqlient</text>
  <text x="420" y="201" text-anchor="middle" font-size="9" fill="#404040">make gen-famly</text>

  <line x1="520" y1="190" x2="600" y2="190" stroke="#4a6741" stroke-width="1.5" marker-end="url(#c-arrow-accent)"/>

  <rect x="600" y="160" width="220" height="60" rx="4" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
  <text x="710" y="183" text-anchor="middle" font-size="11" font-weight="700" fill="#0a0a0a">api/famly/gen.go</text>
  <text x="710" y="201" text-anchor="middle" font-size="9" fill="#404040">typed Go (committed; DO NOT EDIT)</text>

  <line x1="820" y1="190" x2="900" y2="190" stroke="#909090" stroke-width="1.5" marker-end="url(#c-arrow)"/>

  <rect x="900" y="155" width="260" height="70" rx="4" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
  <text x="1030" y="178" text-anchor="middle" font-size="11" font-weight="700" fill="#0a0a0a">api/famly</text>
  <text x="1030" y="196" text-anchor="middle" font-size="9" fill="#404040">Client wraps typed ops + REST helpers</text>
  <text x="1030" y="210" text-anchor="middle" font-size="9" fill="#404040">consumed by internal/sync</text>

  <line x1="20" y1="280" x2="1180" y2="280" stroke="#e0e0e0" stroke-width="1"/>

  <text x="600" y="306" text-anchor="middle" font-size="11" font-weight="700" fill="#909090">IMMICH (OpenAPI)</text>

  <rect x="40" y="320" width="280" height="50" rx="4" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
  <text x="180" y="340" text-anchor="middle" font-size="11" font-weight="700" fill="#0a0a0a">api/immich/openapi.json</text>
  <text x="180" y="358" text-anchor="middle" font-size="9" fill="#404040">vendored from immich-app/immich · MIT</text>

  <line x1="320" y1="345" x2="400" y2="345" stroke="#909090" stroke-width="1.5" marker-end="url(#c-arrow)"/>

  <rect x="400" y="320" width="200" height="50" rx="4" fill="#f4f7f3" stroke="#4a6741" stroke-width="2"/>
  <text x="500" y="340" text-anchor="middle" font-size="11" font-weight="700" fill="#0a0a0a">go tool oapi-codegen</text>
  <text x="500" y="358" text-anchor="middle" font-size="9" fill="#404040">make gen-immich</text>

  <line x1="600" y1="345" x2="680" y2="345" stroke="#4a6741" stroke-width="1.5" marker-end="url(#c-arrow-accent)"/>

  <rect x="680" y="320" width="260" height="50" rx="4" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
  <text x="810" y="340" text-anchor="middle" font-size="11" font-weight="700" fill="#0a0a0a">api/immich/imapi/imapi.go</text>
  <text x="810" y="358" text-anchor="middle" font-size="9" fill="#404040">typed Go (committed)</text>

  <line x1="940" y1="345" x2="1010" y2="345" stroke="#909090" stroke-width="1.5" marker-end="url(#c-arrow)"/>

  <rect x="1010" y="320" width="150" height="50" rx="4" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
  <text x="1085" y="340" text-anchor="middle" font-size="11" font-weight="700" fill="#0a0a0a">api/immich</text>
  <text x="1085" y="358" text-anchor="middle" font-size="9" fill="#404040">Upload helper</text>
  </g>
</svg>
