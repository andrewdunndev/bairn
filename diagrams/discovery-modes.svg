<svg viewBox="0 0 1200 380" width="1200" height="380" font-family="Helvetica, Arial, sans-serif" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="three discovery modes: shape probe (cheapest, scheduled, baseline diff), traffic capture (manual, Playwright HAR diffed against manifest), schema introspection (one-shot, full schema dump if introspection enabled).">
  <defs>
    <marker id="d-arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7 z" fill="#909090"/>
    </marker>
  </defs>
  <g font-family="Helvetica, Arial, sans-serif">

  <text x="20" y="32" font-size="22" font-weight="700" fill="#4a6741">discovery modes</text>
  <text x="20" y="54" font-size="12" fill="#404040">three complementary tools for keeping a typed client aligned with a vendor surface that the vendor doesn't formally document.</text>

  <text x="200" y="98" text-anchor="middle" font-size="11" font-weight="700" fill="#4a6741">MODE 1 · SHAPE PROBE</text>
  <text x="200" y="114" text-anchor="middle" font-size="10" fill="#909090">scheduled · drift detection</text>

  <rect x="40" y="130" width="320" height="220" rx="4" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>

  <rect x="60" y="150" width="280" height="50" rx="3" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <text x="200" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#0a0a0a">manifest.toml (gitignored)</text>
  <text x="200" y="186" text-anchor="middle" font-size="9" fill="#404040">endpoint list + auth env</text>

  <line x1="200" y1="200" x2="200" y2="220" stroke="#909090" stroke-width="1.5" marker-end="url(#d-arrow)"/>

  <rect x="60" y="220" width="280" height="50" rx="3" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <text x="200" y="240" text-anchor="middle" font-size="10" font-weight="600" fill="#0a0a0a">probe/shape.py</text>
  <text x="200" y="256" text-anchor="middle" font-size="9" fill="#404040">hit each endpoint; record JSON keys + types</text>

  <line x1="200" y1="270" x2="200" y2="290" stroke="#909090" stroke-width="1.5" marker-end="url(#d-arrow)"/>

  <rect x="60" y="290" width="280" height="50" rx="3" fill="#f4f7f3" stroke="#4a6741" stroke-width="1.5"/>
  <text x="200" y="310" text-anchor="middle" font-size="10" font-weight="600" fill="#0a0a0a">baselines/&lt;endpoint&gt;.shape</text>
  <text x="200" y="326" text-anchor="middle" font-size="9" fill="#404040">diff vs prior; non-zero exit on drift</text>

  <text x="600" y="98" text-anchor="middle" font-size="11" font-weight="700" fill="#4a6741">MODE 2 · TRAFFIC CAPTURE</text>
  <text x="600" y="114" text-anchor="middle" font-size="10" fill="#909090">manual · coverage discovery</text>

  <rect x="440" y="130" width="320" height="220" rx="4" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>

  <rect x="460" y="150" width="280" height="50" rx="3" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <text x="600" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#0a0a0a">drive Playwright</text>
  <text x="600" y="186" text-anchor="middle" font-size="9" fill="#404040">walk every screen the operator uses</text>

  <line x1="600" y1="200" x2="600" y2="220" stroke="#909090" stroke-width="1.5" marker-end="url(#d-arrow)"/>

  <rect x="460" y="220" width="280" height="50" rx="3" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <text x="600" y="240" text-anchor="middle" font-size="10" font-weight="600" fill="#0a0a0a">DevTools network export</text>
  <text x="600" y="256" text-anchor="middle" font-size="9" fill="#404040">HAR file (gitignored)</text>

  <line x1="600" y1="270" x2="600" y2="290" stroke="#909090" stroke-width="1.5" marker-end="url(#d-arrow)"/>

  <rect x="460" y="290" width="280" height="50" rx="3" fill="#f4f7f3" stroke="#4a6741" stroke-width="1.5"/>
  <text x="600" y="310" text-anchor="middle" font-size="10" font-weight="600" fill="#0a0a0a">jq-distil to (method, path) tuples</text>
  <text x="600" y="326" text-anchor="middle" font-size="9" fill="#404040">diff vs manifest; new entries → typed client</text>

  <text x="1000" y="98" text-anchor="middle" font-size="11" font-weight="700" fill="#4a6741">MODE 3 · INTROSPECTION</text>
  <text x="1000" y="114" text-anchor="middle" font-size="10" font-weight="600" fill="#909090">one-shot · GraphQL schema dump</text>

  <rect x="840" y="130" width="320" height="220" rx="4" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>

  <rect x="860" y="150" width="280" height="50" rx="3" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <text x="1000" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#0a0a0a">probe/introspect.py</text>
  <text x="1000" y="186" text-anchor="middle" font-size="9" fill="#404040">POST {__schema} to /graphql</text>

  <line x1="1000" y1="200" x2="1000" y2="220" stroke="#909090" stroke-width="1.5" marker-end="url(#d-arrow)"/>

  <rect x="860" y="220" width="280" height="50" rx="3" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <text x="1000" y="240" text-anchor="middle" font-size="10" font-weight="600" fill="#0a0a0a">introspection enabled?</text>
  <text x="1000" y="256" text-anchor="middle" font-size="9" fill="#404040">most prod servers disable; some don't</text>

  <line x1="1000" y1="270" x2="1000" y2="290" stroke="#909090" stroke-width="1.5" marker-end="url(#d-arrow)"/>

  <rect x="860" y="290" width="280" height="50" rx="3" fill="#f4f7f3" stroke="#4a6741" stroke-width="1.5"/>
  <text x="1000" y="310" text-anchor="middle" font-size="10" font-weight="600" fill="#0a0a0a">__schema.json (gitignored)</text>
  <text x="1000" y="326" text-anchor="middle" font-size="9" fill="#404040">drives genqlient codegen</text>
  </g>
</svg>
