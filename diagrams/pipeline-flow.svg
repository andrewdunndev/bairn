<svg viewBox="0 0 1200 460" width="1200" height="460" font-family="Helvetica, Arial, sans-serif" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="bairn pipeline flow: per-feed-page, paginate the feed, then for each new asset, fetch the highest-resolution variant from the CDN, embed EXIF and XMP metadata in-file, write atomically to the date subfolder, optionally upload to Immich, record state under flock.">
  <defs>
    <marker id="p-arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7 z" fill="#909090"/>
    </marker>
    <marker id="p-arrow-accent" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7 z" fill="#4a6741"/>
    </marker>
  </defs>
  <g font-family="Helvetica, Arial, sans-serif">

  <text x="20" y="32" font-size="22" font-weight="700" fill="#4a6741">pipeline flow</text>
  <text x="20" y="54" font-size="12" fill="#404040">per fetch run: paginate feed; per asset, transition through five typestate phases.</text>

  <text x="600" y="92" text-anchor="middle" font-size="11" font-weight="700" fill="#909090">FEED LOOP</text>
  <rect x="60" y="105" width="220" height="60" rx="4" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
  <text x="170" y="128" text-anchor="middle" font-size="11" font-weight="600" fill="#0a0a0a">GET feed endpoint</text>
  <text x="170" y="146" text-anchor="middle" font-size="9" fill="#909090">cursor + olderThan from last item</text>

  <line x1="280" y1="135" x2="340" y2="135" stroke="#909090" stroke-width="1.5" marker-end="url(#p-arrow)"/>
  <text x="310" y="125" text-anchor="middle" font-size="9" fill="#909090">page</text>

  <rect x="340" y="105" width="160" height="60" rx="4" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
  <text x="420" y="128" text-anchor="middle" font-size="11" font-weight="600" fill="#0a0a0a">filter source</text>
  <text x="420" y="146" text-anchor="middle" font-size="9" fill="#909090">feed-all / tagged / liked</text>

  <line x1="500" y1="135" x2="560" y2="135" stroke="#909090" stroke-width="1.5" marker-end="url(#p-arrow)"/>

  <rect x="560" y="105" width="220" height="60" rx="4" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
  <text x="670" y="128" text-anchor="middle" font-size="11" font-weight="600" fill="#0a0a0a">already saved?</text>
  <text x="670" y="146" text-anchor="middle" font-size="9" fill="#909090">state.json IsSaved(imageId)</text>

  <line x1="780" y1="135" x2="840" y2="135" stroke="#4a6741" stroke-width="1.5" marker-end="url(#p-arrow-accent)"/>
  <text x="810" y="125" text-anchor="middle" font-size="9" fill="#4a6741" font-weight="700">no</text>

  <rect x="840" y="105" width="180" height="60" rx="4" fill="none" stroke="#4a6741" stroke-width="1.5"/>
  <text x="930" y="128" text-anchor="middle" font-size="11" font-weight="600" fill="#0a0a0a">enter pipeline</text>
  <text x="930" y="146" text-anchor="middle" font-size="9" fill="#4a6741">5 typestate phases</text>

  <line x1="670" y1="165" x2="670" y2="200" stroke="#909090" stroke-width="1.5" marker-end="url(#p-arrow)"/>
  <text x="690" y="184" font-size="9" fill="#909090">yes &#8594; skip, advance</text>

  <text x="600" y="240" text-anchor="middle" font-size="11" font-weight="700" fill="#4a6741">PER-ASSET PIPELINE (typestate; no phase may be skipped)</text>

  <rect x="20" y="260" width="220" height="80" rx="3" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <text x="30" y="280" font-size="11" font-weight="700" fill="#4a6741">1</text>
  <text x="46" y="280" font-size="11" font-weight="600" fill="#0a0a0a">Discovered</text>
  <text x="30" y="298" font-size="10" fill="#404040">image id, signed CDN url,</text>
  <text x="30" y="312" font-size="10" fill="#404040">filename hint, sender,</text>
  <text x="30" y="326" font-size="10" fill="#404040">timestamps, subject tags</text>

  <line x1="240" y1="300" x2="270" y2="300" stroke="#4a6741" stroke-width="1.5" marker-end="url(#p-arrow-accent)"/>

  <rect x="270" y="260" width="220" height="80" rx="3" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <text x="280" y="280" font-size="11" font-weight="700" fill="#4a6741">2</text>
  <text x="296" y="280" font-size="11" font-weight="600" fill="#0a0a0a">Downloaded</text>
  <text x="280" y="298" font-size="10" fill="#404040">stream to temp file,</text>
  <text x="280" y="312" font-size="10" fill="#404040">SHA1 during copy, capture</text>
  <text x="280" y="326" font-size="10" fill="#404040">Content-Type for ext sniff</text>

  <line x1="490" y1="300" x2="520" y2="300" stroke="#4a6741" stroke-width="1.5" marker-end="url(#p-arrow-accent)"/>

  <rect x="520" y="260" width="220" height="80" rx="3" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <text x="530" y="280" font-size="11" font-weight="700" fill="#4a6741">3</text>
  <text x="546" y="280" font-size="11" font-weight="600" fill="#0a0a0a">Saved</text>
  <text x="530" y="298" font-size="10" fill="#404040">rename temp to date subdir,</text>
  <text x="530" y="312" font-size="10" fill="#404040">set mtime, embed EXIF +</text>
  <text x="530" y="326" font-size="10" fill="#404040">XMP atomically (mode 0600)</text>

  <line x1="740" y1="300" x2="770" y2="300" stroke="#909090" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#p-arrow)"/>

  <rect x="770" y="260" width="220" height="80" rx="3" fill="none" stroke="#909090" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="780" y="280" font-size="11" font-weight="700" fill="#909090">4</text>
  <text x="796" y="280" font-size="11" font-weight="600" fill="#0a0a0a">Uploaded</text>
  <text x="858" y="280" font-size="9" fill="#909090">(optional)</text>
  <text x="780" y="298" font-size="10" fill="#404040">POST /api/assets w/</text>
  <text x="780" y="312" font-size="10" fill="#404040">x-immich-checksum (SHA1);</text>
  <text x="780" y="326" font-size="10" fill="#404040">opt-in via env vars</text>

  <line x1="990" y1="300" x2="1020" y2="300" stroke="#4a6741" stroke-width="1.5" marker-end="url(#p-arrow-accent)"/>

  <rect x="1020" y="260" width="160" height="80" rx="3" fill="#f4f7f3" stroke="#4a6741" stroke-width="1.5"/>
  <text x="1030" y="280" font-size="11" font-weight="700" fill="#4a6741">5</text>
  <text x="1046" y="280" font-size="11" font-weight="600" fill="#0a0a0a">Recorded</text>
  <text x="1030" y="298" font-size="10" fill="#404040">state.json updated;</text>
  <text x="1030" y="312" font-size="10" fill="#404040">flush via</text>
  <text x="1030" y="326" font-size="10" fill="#404040">tmp+fsync+rename</text>

  <text x="600" y="380" text-anchor="middle" font-size="10" fill="#909090">crash anywhere from phase 3 onward is recoverable on next run; SavedAt + UploadedAt are independent.</text>

  <line x1="20" y1="430" x2="1180" y2="430" stroke="#e0e0e0" stroke-width="1"/>
  <text x="20" y="448" font-size="10" fill="#909090">Discovered → Downloaded → Saved → (Uploaded?) → Recorded · transitions are methods on each phase type</text>
  <text x="1180" y="448" font-size="10" fill="#909090" text-anchor="end">internal/asset/transitions.go</text>
  </g>
</svg>
