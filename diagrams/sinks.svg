<svg viewBox="0 0 1200 380" width="1200" height="380" font-family="Helvetica, Arial, sans-serif" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="sink abstraction: a Sink interface with Put and Name methods, implemented by a Disk sink (always-on, primary) and an Immich sink (optional, env-gated). Future sinks like S3 and restic plug in without touching the orchestration loop.">
  <defs>
    <marker id="s-arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7 z" fill="#909090"/>
    </marker>
    <marker id="s-arrow-accent" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7 z" fill="#4a6741"/>
    </marker>
  </defs>
  <g font-family="Helvetica, Arial, sans-serif">

  <text x="20" y="32" font-size="22" font-weight="700" fill="#4a6741">sink abstraction</text>
  <text x="20" y="54" font-size="12" fill="#404040">orchestration calls Sink.Put(ctx, in) for each registered sink. Disk is always-on; Immich activates from env. New sinks slot in here.</text>

  <text x="200" y="92" text-anchor="middle" font-size="11" font-weight="700" fill="#4a6741">CALLER</text>
  <rect x="40" y="105" width="320" height="80" rx="4" fill="#f4f7f3" stroke="#4a6741" stroke-width="2"/>
  <text x="200" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="#0a0a0a">internal/sync.processOne</text>
  <text x="200" y="148" text-anchor="middle" font-size="10" fill="#404040">for each registered sink:</text>
  <text x="200" y="164" text-anchor="middle" font-size="10" fill="#404040">  receipt, err := sink.Put(ctx, in)</text>
  <text x="200" y="178" text-anchor="middle" font-size="9" fill="#909090">disk is required; non-disk failures are logged + counted</text>

  <line x1="360" y1="145" x2="430" y2="145" stroke="#909090" stroke-width="1.5" marker-end="url(#s-arrow)"/>

  <text x="600" y="92" text-anchor="middle" font-size="11" font-weight="700" fill="#909090">INTERFACE</text>
  <rect x="430" y="105" width="340" height="80" rx="4" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
  <text x="600" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="#0a0a0a">type Sink interface</text>
  <text x="600" y="148" text-anchor="middle" font-size="10" fill="#404040">Put(ctx, PutInput) (Receipt, error)</text>
  <text x="600" y="164" text-anchor="middle" font-size="10" fill="#404040">Name() string</text>
  <text x="600" y="180" text-anchor="middle" font-size="9" fill="#909090">Receipt: dest path or asset id, status, size</text>

  <line x1="500" y1="185" x2="240" y2="220" stroke="#4a6741" stroke-width="1.5" marker-end="url(#s-arrow-accent)"/>
  <line x1="600" y1="185" x2="600" y2="220" stroke="#909090" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#s-arrow)"/>
  <line x1="700" y1="185" x2="960" y2="220" stroke="#909090" stroke-width="0.7" stroke-dasharray="3,4" marker-end="url(#s-arrow)"/>

  <text x="600" y="240" text-anchor="middle" font-size="11" font-weight="700" fill="#909090">IMPLEMENTATIONS</text>

  <rect x="60" y="255" width="320" height="100" rx="4" fill="#f4f7f3" stroke="#4a6741" stroke-width="1.5"/>
  <text x="220" y="278" text-anchor="middle" font-size="12" font-weight="700" fill="#0a0a0a">sink.Disk</text>
  <text x="220" y="296" text-anchor="middle" font-size="10" font-weight="600" fill="#4a6741">always-on · primary contract</text>
  <text x="220" y="314" text-anchor="middle" font-size="10" fill="#404040">honors filename + dir patterns</text>
  <text x="220" y="330" text-anchor="middle" font-size="10" fill="#404040">tmp+rename + EXIF/XMP rewrite</text>
  <text x="220" y="346" text-anchor="middle" font-size="10" fill="#404040">mode 0600; mtime from createdAt</text>

  <rect x="430" y="255" width="340" height="100" rx="4" fill="none" stroke="#909090" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="600" y="278" text-anchor="middle" font-size="12" font-weight="700" fill="#404040">sink.Immich</text>
  <text x="600" y="296" text-anchor="middle" font-size="10" font-weight="600" fill="#909090">env-gated · IMMICH_BASE_URL + KEY</text>
  <text x="600" y="314" text-anchor="middle" font-size="10" fill="#404040">multipart POST /api/assets</text>
  <text x="600" y="330" text-anchor="middle" font-size="10" fill="#404040">SHA1 dedup via x-immich-checksum</text>
  <text x="600" y="346" text-anchor="middle" font-size="10" fill="#404040">famlyImageId persisted as metadata</text>

  <rect x="820" y="255" width="340" height="100" rx="4" fill="#fafafa" stroke="#c0c0c0" stroke-width="1" stroke-dasharray="3,4"/>
  <text x="990" y="278" text-anchor="middle" font-size="12" font-weight="700" fill="#909090">future</text>
  <text x="990" y="296" text-anchor="middle" font-size="10" font-weight="600" fill="#909090">sink.S3 · sink.Restic · sink.NAS</text>
  <text x="990" y="314" text-anchor="middle" font-size="10" fill="#909090">implement Sink, register in config</text>
  <text x="990" y="330" text-anchor="middle" font-size="10" fill="#909090">no edits to processOne</text>
  <text x="990" y="346" text-anchor="middle" font-size="9" fill="#909090">that's the abstraction's whole point</text>
  </g>
</svg>
