<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 80" role="img" aria-label="bairn glyph: an open photo album spread with two facing pages, each holding two photographs and their captions.">
  <g stroke="#4a6741" fill="none" stroke-linecap="round">
    <!-- page-stack depth on the right edge -->
    <line x1="128" y1="12" x2="132" y2="12" stroke-width="1"/>
    <line x1="128" y1="20" x2="132" y2="20" stroke-width="1"/>
    <!-- album outline (4-snapped: 4..132 wide, 4..68 tall) -->
    <rect x="4" y="4" width="128" height="64" stroke-width="2"/>
    <!-- centre binding -->
    <line x1="68" y1="4" x2="68" y2="68" stroke-width="1.5"/>
    <!-- left page: two photos, one caption line each -->
    <rect x="12" y="12" width="20" height="16" stroke-width="1"/>
    <line x1="36" y1="20" x2="60" y2="20" stroke-width="1"/>
    <rect x="12" y="36" width="20" height="16" stroke-width="1"/>
    <line x1="36" y1="44" x2="60" y2="44" stroke-width="1"/>
    <!-- right page: same shape, mirrored -->
    <rect x="76" y="12" width="20" height="16" stroke-width="1"/>
    <line x1="100" y1="20" x2="124" y2="20" stroke-width="1"/>
    <rect x="76" y="36" width="20" height="16" stroke-width="1"/>
    <line x1="100" y1="44" x2="124" y2="44" stroke-width="1"/>
  </g>
</svg>
