default:
  tags:
    - storr
  interruptible: true

# v2.0.0 catalog: auto-cancel build/test on superseded MR pushes;
# release-stage jobs (template-side interruptible: false) continue.
# on_job_failure: all stops the pipeline the moment a release-blocking
# job fails so we don't keep signing/uploading after a fail.
workflow:
  auto_cancel:
    on_new_commit: interruptible
    on_job_failure: all

stages:
  - lint
  - test
  - build
  - drift-gate
  - package
  - release
  - deploy
  - drift-triage

variables:
  GOFLAGS: -mod=readonly

include:
  # Schedule/web-triggered drift triage. Sends shape diffs to Claude
  # for classification when bairn's drift command emits non-empty
  # output. Held as a placeholder for now: drift_command is `echo ''`
  # because bairn does not fire scheduled drift against Famly. See
  # docs/decisions/0007-llm-augmented-ci.md for the relationship-side
  # reasoning. The component stays included so a future change of
  # posture is a one-line flip.
  - component: gitlab.com/dunn.dev/pipeline/claude-drift-triage@2.1.2
    inputs:
      drift_command: "echo ''"
      issue_on_drift: true
      issue_label: "drift,ai-triaged"
      stage: drift-triage

  # Lint-stage golangci-lint via the catalog's pinned ci-go. Real
  # gate (no allow_failure). The previous bespoke
  # docker.io/golangci/golangci-lint:latest-alpine path forced
  # allow_failure to absorb rate-cap pull flakes; that workaround
  # was masking real lint hits.
  - component: gitlab.com/dunn.dev/pipeline/go-lint@2.1.2

  # Lint-stage govulncheck. Allow_failure by default (vuln-DB
  # shifts shouldn't block a release).
  - component: gitlab.com/dunn.dev/pipeline/go-audit@2.1.2

  # Branch verification: parallel:matrix cross-compile on every
  # push (linux/amd64, linux/arm64, darwin/arm64). Module-cached.
  # Skipped on tag pipelines (go-release-binary supersedes).
  - component: gitlab.com/dunn.dev/pipeline/go-build@2.1.2
    inputs:
      binary_name: bairn
      package_path: ./cmd/bairn

  # Tag-only: parallel:matrix cross-compile + per-binary cosign
  # signature + per-binary .sha256 + upload to package registry.
  - component: gitlab.com/dunn.dev/pipeline/go-release-binary@2.1.2
    inputs:
      binary_name: bairn
      package_path: ./cmd/bairn
      package_name: bairn

  # Tag-only: CycloneDX SBOM per binary via syft.
  - component: gitlab.com/dunn.dev/pipeline/go-sbom@2.1.2
    inputs:
      package_name: bairn

  # Tag-only: SLSA v1.0 provenance per binary, cosign-signed via
  # GitLab OIDC keyless.
  - component: gitlab.com/dunn.dev/pipeline/slsa-attest@2.1.2

  # Tag-only: GitLab Release with binaries + SBOMs + attestations
  # linked. Idempotent across pipeline reruns.
  - component: gitlab.com/dunn.dev/pipeline/release-create@2.1.2
    inputs:
      package_name: bairn
      release_title: "bairn $CI_COMMIT_TAG"

  # Container build: ships an OCI image alongside each tagged
  # release at registry.gitlab.com/dunn.dev/bairn/cli:vX.Y.Z.
  #
  # from_artifacts: true means the Containerfile is a thin runtime
  # layer that COPYs the already-built, cosign-signed binary from
  # go-release-binary's dist/ output. Provable byte-for-byte parity
  # between the binary verifiable via cosign verify-blob and the
  # one running inside the container.
  #
  # multi_arch: false in v0.5.0 (storr runner's qemu-user-static
  # support is unverified; flipping to true in v0.5.1 after confirming).
  # Apple Silicon / Graviton users can still run via emulation
  # against the amd64 image; flipping to multi_arch: true means
  # native-arch images, no emulation overhead.
  #
  # sign_image: true cosign-signs the pushed image by digest.
  - component: gitlab.com/dunn.dev/pipeline/container-image@2.1.2
    inputs:
      containerfile: Containerfile
      image_tag: cli
      stage: package
      tag_pipeline: true
      from_artifacts: true
      multi_arch: false
      sign_image: true

  # One-pager site at bairn.dunn.dev. Astro static build under web/,
  # shipped as a Cloudflare Worker with bound static assets. Build
  # runs on every push + MR; deploy runs only on main. Custom-domain
  # binding to bairn.dunn.dev is configured in wrangler.toml; the
  # zone-side DNS record needs to exist before the first deploy.
  - component: gitlab.com/dunn.dev/pipeline/cloudflare-worker@2.2.3
    inputs:
      wrangler_config: web/wrangler.toml
      build_command: npm run build
      output_dir: web/dist
      needs_npm_install: true
      npm_dir: web
      production_url: https://bairn.dunn.dev


# test uses the catalog's pinned ci-go image. Pinning to v2.0.0
# matches the catalog tag bairn pins; keeps tooling deliberate.
test:
  stage: test
  image: registry.gitlab.com/dunn.dev/pipeline/ci-go:2.1.2
  script:
    - go test -race ./...

# Tag-only pre-release drift gate. Builds bairn, hits Famly's
# parent-side surface against the operator's own access token, and
# diffs response shapes against the committed baseline at
# discovery/baselines/main/. Fails the tag pipeline (exit 1) when
# drift is detected so a binary that no longer matches Famly's
# response shapes does not ship.
#
# Fires once per tag push, lined up with a human action (the
# maintainer tagging a release). NOT a recurring schedule. See
# discovery/PROTOCOL.md and docs/decisions/0007-llm-augmented-ci.md
# for the posture.
#
# Operator must set FAMLY_ACCESS_TOKEN as a masked, protected
# project CI variable. A forker who does not set the variable will
# see this job fail at tag time; that is the intended signal.
drift-gate:
  stage: drift-gate
  image: registry.gitlab.com/dunn.dev/pipeline/ci-go:2.1.2
  interruptible: false
  script:
    - go build -o bin/bairn ./cmd/bairn
    - bin/bairn drift --anonymize --manifest discovery/probe/manifest.toml --diff discovery/baselines/main
  rules:
    - if: $CI_COMMIT_TAG

# Pre-release drift gate against the operator's Immich server.
# Only fires on web/api triggers (operator-initiated, can pre-set
# IMMICH_BASE_URL/IMMICH_API_KEY for the run). NOT on tag pipelines:
# the storr runner cannot reach a typical homelab Immich (LAN
# service, no NAT hairpin), and the previous tag-rule with
# allow_failure: true was decorating every release with a red X
# and training operators to ignore the signal.
#
# Local equivalent: `make pre-tag-check` runs the live smoke
# before `git tag`; that's the actual gate.
drift-gate-immich:
  stage: drift-gate
  image: registry.gitlab.com/dunn.dev/pipeline/ci-go:2.1.2
  interruptible: false
  script:
    - go build -o bin/bairn ./cmd/bairn
    - bin/bairn drift --anonymize --manifest discovery/probe/manifest-immich.toml --diff discovery/baselines/main-immich
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"

# Write-side smoke test against the operator's Immich. Round-trip:
# login → mint ephemeral API key → upload tiny JPEG via bairn's
# actual Upload code path → assert created → delete asset → delete
# API key. Catches controller-layer wire-contract enforcement that
# no vendored OpenAPI / TypeScript schema captures.
#
# Same web/api-only posture as drift-gate-immich. The local
# `make pre-tag-check` is the tag-time gate.
smoke-immich:
  stage: drift-gate
  image: registry.gitlab.com/dunn.dev/pipeline/ci-go:2.1.2
  interruptible: false
  script:
    - go build -o bin/bairn ./cmd/bairn
    - bin/bairn smoke immich
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"
