default:
  tags:
    - storr

stages:
  - lint
  - test
  - build
  - drift-gate
  - package
  - release
  - drift-triage

variables:
  GOFLAGS: -mod=readonly

include:
  # Schedule/web-triggered drift triage. Sends shape diffs to Claude
  # for classification when bairn's drift command emits non-empty
  # output. Held as a placeholder for now: drift_command is `echo ''`
  # because bairn does not fire scheduled drift against Famly. See
  # docs/decisions/0007-llm-augmented-ci.md for the relationship-side
  # reasoning. The component stays included so a future change of
  # posture is a one-line flip.
  - component: gitlab.com/dunn.dev/pipeline/claude-drift-triage@v1.5.2
    inputs:
      drift_command: "echo ''"
      issue_on_drift: true
      issue_label: "drift,ai-triaged"
      stage: drift-triage

  # Lint-stage govulncheck against the source. Allow_failure by
  # default; vulnerability database changes shouldn't block a
  # release, but the report is still visible in the pipeline.
  - component: gitlab.com/dunn.dev/pipeline/go-audit@v1.5.2

  # Branch verification: cross-compile linux/amd64 + darwin/arm64
  # on every push. Skipped on tag pipelines.
  - component: gitlab.com/dunn.dev/pipeline/go-build@v1.5.2
    inputs:
      binary_name: bairn
      package_path: ./cmd/bairn

  # Tag-only: cross-compile, generate checksums, sign each binary
  # keyless via cosign + GitLab OIDC, upload everything to the
  # project's generic package registry.
  - component: gitlab.com/dunn.dev/pipeline/go-release-binary@v1.5.2
    inputs:
      binary_name: bairn
      package_path: ./cmd/bairn
      package_name: bairn

  # Tag-only: CycloneDX SBOM per binary via syft, uploaded
  # alongside the binaries.
  - component: gitlab.com/dunn.dev/pipeline/go-sbom@v1.5.2
    inputs:
      package_name: bairn

  # Tag-only: SLSA v1.0 provenance per binary, keyless-signed via
  # cosign + GitLab OIDC. Bundles upload to the project's
  # provenance package.
  - component: gitlab.com/dunn.dev/pipeline/slsa-attest@v1.5.2

  # Tag-only: create the GitLab Release record from the annotated
  # tag's message, then link the binaries, checksums, SBOMs, and
  # SLSA attestations as Release assets.
  - component: gitlab.com/dunn.dev/pipeline/release-create@v1.5.2
    inputs:
      package_name: bairn
      release_title: "bairn $CI_COMMIT_TAG"

lint:
  stage: lint
  image: golangci/golangci-lint:latest-alpine
  script:
    - golangci-lint run ./...
  allow_failure: true

test:
  stage: test
  image: golang:1.25
  script:
    - go test -race ./...

# Tag-only pre-release drift gate. Builds bairn, hits Famly's
# parent-side surface against the operator's own access token, and
# diffs response shapes against the committed baseline at
# discovery/baselines/main/. Fails the tag pipeline (exit 1) when
# drift is detected so a binary that no longer matches Famly's
# response shapes does not ship.
#
# Fires once per tag push, lined up with a human action (the
# maintainer tagging a release). NOT a recurring schedule. See
# discovery/PROTOCOL.md and docs/decisions/0007-llm-augmented-ci.md
# for the posture.
#
# Operator must set FAMLY_ACCESS_TOKEN as a masked, protected
# project CI variable. A forker who does not set the variable will
# see this job fail at tag time; that is the intended signal.
drift-gate:
  stage: drift-gate
  image: golang:1.25
  script:
    - go build -o bin/bairn ./cmd/bairn
    - bin/bairn drift --anonymize --manifest discovery/probe/manifest.toml --diff discovery/baselines/main
  rules:
    - if: $CI_COMMIT_TAG
