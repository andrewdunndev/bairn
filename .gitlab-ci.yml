default:
  tags:
    - storr

stages:
  - lint
  - test
  - build
  - package
  - release
  - drift

variables:
  GOFLAGS: -mod=readonly

include:
  # Schedule-triggered drift triage. Sends shape diffs to Claude
  # when bairn's drift command emits non-empty output. See
  # docs/decisions/0007-llm-augmented-ci.md for the posture.
  #
  # Until bairn drift is native Go (deferred to v0.2.0), the
  # drift_command below is a placeholder that always produces
  # empty output, so the component exits cleanly without an API
  # call. When native drift lands, swap to "./bairn drift".
  - component: gitlab.com/dunn.dev/pipeline/claude-drift-triage@v1.5.0
    inputs:
      drift_command: "echo ''"
      issue_on_drift: true
      issue_label: "drift,ai-triaged"
      stage: drift

  # Lint-stage govulncheck against the source. Allow_failure by
  # default; vulnerability database changes shouldn't block a
  # release, but the report is still visible in the pipeline.
  - component: gitlab.com/dunn.dev/pipeline/go-audit@v1.5.0

  # Branch verification: cross-compile linux/amd64 + darwin/arm64
  # on every push. Skipped on tag pipelines.
  - component: gitlab.com/dunn.dev/pipeline/go-build@v1.5.0
    inputs:
      binary_name: bairn
      package_path: ./cmd/bairn

  # Tag-only: cross-compile, generate checksums, sign each binary
  # keyless via cosign + GitLab OIDC, upload everything to the
  # project's generic package registry.
  - component: gitlab.com/dunn.dev/pipeline/go-release-binary@v1.5.0
    inputs:
      binary_name: bairn
      package_path: ./cmd/bairn
      package_name: bairn

  # Tag-only: CycloneDX SBOM per binary via syft, uploaded
  # alongside the binaries.
  - component: gitlab.com/dunn.dev/pipeline/go-sbom@v1.5.0
    inputs:
      package_name: bairn

  # Tag-only: SLSA v1.0 provenance per binary, keyless-signed via
  # cosign + GitLab OIDC. Bundles upload to the project's
  # provenance package.
  - component: gitlab.com/dunn.dev/pipeline/slsa-attest@v1.5.0

  # Tag-only: create the GitLab Release record from the annotated
  # tag's message, then link the binaries, checksums, SBOMs, and
  # SLSA attestations as Release assets.
  - component: gitlab.com/dunn.dev/pipeline/release-create@v1.5.0
    inputs:
      package_name: bairn
      release_title: "bairn $CI_COMMIT_TAG"

lint:
  stage: lint
  image: golangci/golangci-lint:latest-alpine
  script:
    - golangci-lint run ./...
  allow_failure: true

test:
  stage: test
  image: golang:1.25
  script:
    - go test -race ./...
